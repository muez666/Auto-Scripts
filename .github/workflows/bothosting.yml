name: Bot-Hosting Auto Claim

on:
  schedule:
    - cron: '0 1,13 * * *'  # 北京时间 9:00 和 21:00
  workflow_dispatch:

jobs:
  claim-coins:
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 避免依赖问题
    timeout-minutes: 15
    
    steps:
    - name: Checkout private repo
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Bothosting-Auto-Claim
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: scripts
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Setup Gost Proxy
      env:
        SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
      run: |
        # 如果没有环境变量，跳过 Gost 设置
        if [ -z "$SOCKS_PROXY_URL" ]; then
          echo "ℹ️ 未配置代理，跳过 Gost 设置"
          exit 0
        fi
        
        echo "🌐 使用环境变量代理: ${SOCKS_PROXY_URL%%:*}://***"
        
        # 安装 Gost
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip gost-linux-amd64-2.11.5.gz
        sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
        sudo chmod +x /usr/local/bin/gost
        
        # 启动 Gost
        nohup gost -L=:1080 -F="$SOCKS_PROXY_URL" > gost.log 2>&1 &
        sleep 5
        
        # 验证
        if pgrep -x "gost" > /dev/null && netstat -tuln | grep -q ":1080 "; then
          echo "✅ Gost 代理已启动"
        else
          echo "❌ Gost 启动失败"
          cat gost.log 2>/dev/null
          exit 1
        fi
        
        # 测试代理连接
        if curl -x socks5://127.0.0.1:1080 https://www.google.com -I --max-time 10 --silent --fail > /dev/null 2>&1; then
          echo "✅ 代理连接测试成功"
        else
          echo "⚠️ 代理连接测试失败（可能是上游代理问题，继续执行）"
        fi
        
    - name: Install dependencies
      working-directory: scripts
      run: |
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
        
    - name: Setup NopeCHA extension
      working-directory: scripts
      run: |
        mkdir -p extensions/nopecha/unpacked
        cd extensions/nopecha
        # 使用普通版本（chromium.zip）
        wget -qO chromium.zip https://github.com/NopeCHALLC/nopecha-extension/releases/download/0.5.5/chromium.zip
        unzip -q chromium.zip -d unpacked/
        chmod -R 755 unpacked/
        echo "✅ NopeCHA 扩展已安装"
        
    - name: Run claim script
      working-directory: scripts
      env:
        SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
        USE_GOST_PROXY: ${{ secrets.SOCKS_PROXY_URL != '' && 'true' || 'false' }}
        NOPECHA_API_KEY: ${{ secrets.NOPECHA_API_KEY }}
      run: xvfb-run -a python main.py
      
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.run_number }}
        path: |
          scripts/user_info.json
          scripts/screenshots/
        retention-days: 7
        if-no-files-found: ignore
