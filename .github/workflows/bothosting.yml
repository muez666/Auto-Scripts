name: Bot-Hosting Auto Claim

on:
  schedule:
    - cron: '0 1,13 * * *'  # 北京时间 9:00 和 21:00
  workflow_dispatch:

jobs:
  claim-coins:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout private repo
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Bothosting-Auto-Claim
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: scripts
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      working-directory: scripts
      run: |
        pip install -r requirements.txt -q > /dev/null 2>&1
        playwright install chromium > /dev/null 2>&1
        playwright install-deps chromium > /dev/null 2>&1
        
    - name: Setup NopeCHA extension
      working-directory: scripts
      run: |
        mkdir -p extensions/nopecha/unpacked
        cd extensions/nopecha
        wget -qO chromium.zip https://github.com/NopeCHALLC/nopecha-extension/releases/download/0.5.5/chromium.zip
        unzip -q chromium.zip -d unpacked/
        
        # 设置权限
        chmod -R 755 unpacked/
        
        # 验证文件
        echo "📋 Extension files:"
        ls -la unpacked/
        
        # 显示 manifest.json 内容
        echo "📄 Manifest content:"
        cat unpacked/manifest.json
        
        # 获取绝对路径
        echo "📂 Absolute path:"
        pwd
        realpath unpacked/
        
    - name: Run claim script
      working-directory: scripts
      run: xvfb-run -a python main.py
      
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.run_number }}
        path: |
          scripts/user_info.json
          scripts/screenshots/
        retention-days: 7
        if-no-files-found: ignore
