name: Daki.cc Auto Renew

on:
  schedule:
    - cron: '0 4 * * *'    # 每天 12:00 (UTC+8)
  workflow_dispatch:  # 手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout private scripts
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Daki-Auto-Renew  # 替换为你的私有仓库
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: scripts
    
    - name: Set up WARP
      uses: fscarmen/warp-on-actions@v1.4
      with:
        stack: dual        # Optional. Support [ ipv4, ipv6, dual ]. Default is dual.
        mode: client
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: scripts
      run: |
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Run daki renew script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        SERVER_ID: ${{ secrets.SERVER_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        HEADLESS: 'true'
      working-directory: scripts
      run: python main.py
