name: KeritCloud Auto Renew

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/KeritCloud-Auto-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Setup Gost Proxy
        working-directory: scripts
        run: |
          # 从 main.py 中读取 SOCKS_PROXY 配置
          SOCKS_PROXY=$(python3 -c "import sys; sys.path.insert(0, '.'); from main import get_socks_proxy; print(get_socks_proxy() or '')")
          
          if [ -z "$SOCKS_PROXY" ]; then
            echo "⚠️ 未配置 SOCKS 代理，跳过代理设置"
            exit 0
          fi
          
          echo "配置的代理: ${SOCKS_PROXY%%:*}://***"
          
          # 下载并启动 Gost
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          ./gost-linux-amd64-2.11.5 -L=:1080 -F="$SOCKS_PROXY" > gost.log 2>&1 &
          
          # 等待 Gost 启动
          sleep 10
          echo "✅ Gost 已启动"
      
      - name: Run renew script
        working-directory: scripts
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
          PROXY_SERVER: socks5://127.0.0.1:1080
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renewal-screenshots
          path: scripts/*.png
          retention-days: 30
